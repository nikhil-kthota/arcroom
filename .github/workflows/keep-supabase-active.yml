name: Keep Supabase Active

on:
  schedule:
    # Runs every 3 days at midnight UTC to prevent pausing (which happens after 7 days of inactivity)
    - cron: '0 0 */3 * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/rooms?select=*&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Supabase is active."
          else
            echo "Unexpected status code: $STATUS"
            exit 1
          fi
