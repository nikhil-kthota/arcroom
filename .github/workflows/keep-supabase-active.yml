name: Keep Supabase Active

on:
  push:
    branches: ["main"]
  schedule:
    # Runs every 3 days at midnight UTC to prevent pausing (which happens after 7 days of inactivity)
    - cron: '0 0 */3 * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          URL="${{ secrets.VITE_SUPABASE_URL }}"
          KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          echo "URL length: ${#URL}"
          echo "KEY length: ${#KEY}"
          STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" \
            "${URL}/rest/v1/rooms?select=*&limit=1" \
            -H "apikey: ${KEY}" \
            -H "Authorization: Bearer ${KEY}")
          echo "Supabase responded with HTTP status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Supabase is active."
          else
            echo "Unexpected status code: $STATUS"
            if [ ${#URL} -gt 0 ]; then
              curl -s -L "${URL}/rest/v1/rooms?select=*&limit=1" \
                -H "apikey: ${KEY}" \
                -H "Authorization: Bearer ${KEY}"
            fi
            exit 1
          fi
